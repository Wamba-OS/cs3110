name: Claude Security Review

on:
  issue_comment:
    types: [created]
  # Uncomment after Phase 4.5 testing is complete:
  # pull_request:
  #   types: [opened, synchronize]
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-security-review:
    name: Security Review by Claude
    # Only run on PR comments that mention @claude
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Get PR number
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            let pr_number;
            if (context.eventName === 'workflow_dispatch') {
              const prs = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                sort: 'updated',
                direction: 'desc',
                per_page: 1
              });
              pr_number = prs.data[0]?.number;
            } else if (context.eventName === 'issue_comment') {
              pr_number = context.issue.number;
            } else if (context.eventName === 'pull_request') {
              pr_number = context.issue.number;
            }

            if (!pr_number) {
              core.setFailed('Could not determine PR number');
              return;
            }

            core.setOutput('number', pr_number);
            console.log(`PR number: ${pr_number}`);

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ steps.pr.outputs.number }}/head
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install anthropic requests

      - name: Create security artifacts directory
        run: mkdir -p .security-artifacts

      # ==========================================
      # Run Security Scans
      # ==========================================
      - name: Run npm audit
        continue-on-error: true
        run: |
          npm install --package-lock-only
          npm audit --json > .security-artifacts/npm-audit.json || true

      - name: Run Semgrep
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep scan \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/express \
            --config=p/security-audit \
            --sarif \
            --output=.security-artifacts/semgrep.sarif \
            . || true

      - name: Run Gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Move Gitleaks results
        if: always()
        run: |
          if [ -f results.sarif ]; then
            mv results.sarif .security-artifacts/gitleaks.sarif
          fi

      - name: Verify artifacts
        run: |
          echo "Security artifacts created:"
          ls -lh .security-artifacts/

      # ==========================================
      # Run Security Review
      # ==========================================
      - name: Run Claude security review
        id: security-review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          chmod +x .github/scripts/security_review.py
          python3 .github/scripts/security_review.py || echo "Review completed with findings"

      - name: Read verdict
        id: verdict
        run: |
          if [ -f verdict.json ]; then
            verdict=$(jq -r '.verdict' verdict.json)
            risk_score=$(jq -r '.risk_score' verdict.json)
            summary=$(jq -r '.summary' verdict.json)
            findings_count=$(jq '.findings | length' verdict.json)

            echo "verdict=$verdict" >> $GITHUB_OUTPUT
            echo "risk_score=$risk_score" >> $GITHUB_OUTPUT
            echo "summary=$summary" >> $GITHUB_OUTPUT
            echo "findings_count=$findings_count" >> $GITHUB_OUTPUT

            echo "Verdict: $verdict"
            echo "Risk Score: $risk_score"
            echo "Findings: $findings_count"
          else
            echo "verdict=ERROR" >> $GITHUB_OUTPUT
            echo "ERROR: verdict.json not found"
            exit 1
          fi

      # ==========================================
      # Post Results to PR
      # ==========================================
      - name: Post security review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const verdict = JSON.parse(fs.readFileSync('verdict.json', 'utf8'));

            // Build comment body
            let comment = '## 🔒 Claude Security Review\n\n';
            comment += `**Verdict:** ${verdict.verdict === 'PASS' ? '✅ PASS' : '❌ FAIL'}\n`;
            comment += `**Risk Score:** ${verdict.risk_score}/100\n`;
            comment += `**Summary:** ${verdict.summary}\n\n`;

            if (verdict.findings && verdict.findings.length > 0) {
              comment += '### Findings\n\n';
              for (const finding of verdict.findings) {
                const emoji = {
                  'Critical': '🔴',
                  'High': '🟠',
                  'Medium': '🟡',
                  'Low': '🔵',
                  'Info': 'ℹ️'
                }[finding.severity] || '';

                comment += `#### ${emoji} ${finding.severity}: ${finding.title}\n`;
                comment += `- **File:** \`${finding.file}\`${finding.line ? `:${finding.line}` : ''}\n`;
                if (finding.cwe) comment += `- **CWE:** ${finding.cwe}\n`;
                comment += `- **Source:** ${finding.source}\n`;
                comment += `- **Explanation:** ${finding.explanation}\n`;
                if (finding.suggested_fix) {
                  comment += `- **Suggested Fix:** ${finding.suggested_fix}\n`;
                }
                comment += '\n';
              }
            }

            if (verdict.next_steps_for_implementer && verdict.next_steps_for_implementer.length > 0) {
              comment += '### Next Steps\n\n';
              for (let i = 0; i < verdict.next_steps_for_implementer.length; i++) {
                comment += `${i + 1}. ${verdict.next_steps_for_implementer[i]}\n`;
              }
              comment += '\n';
            }

            comment += '---\n';
            comment += '*🤖 Generated by Claude Code security-reviewer agent*\n';

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.pr.outputs.number }},
              body: comment
            });

      - name: Add security label
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.verdict.outputs.verdict }}';
            const label = verdict === 'PASS' ? 'security:pass' : 'security:fail';

            // Remove opposite label if exists
            const oppositeLabel = verdict === 'PASS' ? 'security:fail' : 'security:pass';
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                name: oppositeLabel
              });
            } catch (e) {
              // Label might not exist, that's fine
            }

            // Add new label (create if it doesn't exist)
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                labels: [label]
              });
            } catch (e) {
              // Try to create the label first
              const color = label === 'security:pass' ? '0E8A16' : 'D73A4A';
              const description = label === 'security:pass' ? 'Security review passed' : 'Security review failed';

              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: color,
                description: description
              });

              // Now add it
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: ${{ steps.pr.outputs.number }},
                labels: [label]
              });
            }

      - name: Fail workflow if security verdict is FAIL
        if: steps.verdict.outputs.verdict == 'FAIL'
        run: |
          echo "❌ Security review FAILED with risk score ${{ steps.verdict.outputs.risk_score }}"
          echo "See PR comment for details"
          exit 1
